<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mira Cameras — IPC Terminal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .card { background: #1e293b; border: 1px solid #334155; }
    .qr-box { background: #fff; border-radius: 12px; padding: 12px; display: inline-block; }
    .qr-box img { width: 220px; height: 220px; }
    .badge-region { background: #334155; }
    .device-row { border-bottom: 1px solid #334155; }
    .device-row:last-child { border-bottom: 0; }
    .muted { color: #94a3b8; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark border-bottom border-secondary mb-4">
    <div class="container">
      <span class="navbar-brand mb-0 h1">Mira Cameras</span>
      <span class="badge badge-region" id="regionBadge">—</span>
    </div>
  </nav>

  <main class="container pb-5">
    <div id="loginPanel" class="row justify-content-center">
      <div class="col-lg-5">
        <div class="card shadow">
          <div class="card-body p-4 text-center">
            <h2 class="h4 mb-1">Login IPC Terminal</h2>
            <p class="muted small mb-3">Escaneie com o app SmartLife / Tuya Smart onde suas câmeras estão</p>

            <div class="mb-3">
              <label for="regionSelect" class="form-label small muted">Data center</label>
              <select id="regionSelect" class="form-select form-select-sm bg-dark text-light border-secondary">
                <option value="us">Western America (protect-us)</option>
                <option value="eu">Europe (protect-eu)</option>
              </select>
            </div>

            <div class="qr-box mb-3" id="qrContainer">
              <div class="spinner-border text-secondary" role="status"></div>
            </div>

            <p class="small muted mb-3" id="loginStatus">Gerando QR code…</p>
            <button type="button" class="btn btn-outline-light btn-sm" id="refreshBtn">Atualizar QR</button>
          </div>
        </div>
      </div>
    </div>

    <div id="dashboardPanel" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <h2 class="h4 mb-0">Olá, <span id="userName">—</span></h2>
          <p class="muted small mb-0">Sessão autenticada na plataforma nova (security-wisdom)</p>
        </div>
        <button type="button" class="btn btn-outline-danger btn-sm" id="logoutBtn">Sair</button>
      </div>

      <div class="row g-3">
        <div class="col-md-4">
          <div class="card h-100">
            <div class="card-header border-secondary">Casas / grupos</div>
            <div class="list-group list-group-flush" id="homeList"></div>
          </div>
        </div>
        <div class="col-md-8">
          <div class="card h-100">
            <div class="card-header border-secondary d-flex justify-content-between align-items-center">
              <span>Dispositivos</span>
              <div class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" id="camerasOnly" checked>
                <label class="form-check-label small" for="camerasOnly">Só câmeras</label>
              </div>
            </div>
            <div class="card-body p-0" id="deviceList">
              <p class="p-3 muted small mb-0">Selecione uma casa à esquerda</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
