<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mira Cameras — Mural</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/site.css" rel="stylesheet">
  <style>
    :root { --tile-min: 200px; --toolbar-h: 52px; --footer-h: 32px; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #050810; color: #e2e8f0; min-height: 100vh; overflow: hidden; }
    .toolbar {
      height: var(--toolbar-h); background: #0f172a; border-bottom: 1px solid #1e293b;
      display: flex; align-items: center; gap: 0.75rem; padding: 0 1rem; z-index: 20; position: relative;
    }
    .toolbar .brand { font-weight: 600; font-size: 1rem; white-space: nowrap; }
    .stat-pill { font-size: 0.75rem; padding: 0.2rem 0.55rem; border-radius: 999px; background: #1e293b; color: #94a3b8; }
    .stat-pill.live { color: #4ade80; background: #14532d; }
    .wall-wrap { height: calc(100vh - var(--toolbar-h) - var(--footer-h)); overflow: auto; padding: 0.5rem; }
    .wall-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--tile-min), 1fr)); gap: 0.45rem; }
    .tile {
      position: relative; aspect-ratio: 16 / 10; background: #111827;
      border: 1px solid #1f2937; border-radius: 6px; overflow: hidden;
    }
    .tile.live { border-color: #166534; }
    .tile canvas { width: 100%; height: 100%; object-fit: cover; display: block; background: #000; position: absolute; inset: 0; z-index: 1; }
    .tile-meta {
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 2; padding: 0.35rem 0.45rem;
      background: linear-gradient(transparent, rgba(0,0,0,.85)); font-size: 0.68rem; line-height: 1.25; pointer-events: none;
    }
    .tile-meta .home { color: #fbbf24; font-weight: 600; }
    .tile-meta .dev { color: #cbd5e1; }
    .tile-badge {
      position: absolute; top: 0.35rem; right: 0.35rem; z-index: 2; font-size: 0.62rem;
      padding: 0.12rem 0.4rem; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.03em;
    }
    .tile-badge.live { background: #15803d; color: #ecfdf5; }
    .tile-badge.wait { background: #713f12; color: #fef3c7; }
    .tile-badge.err { background: #7f1d1d; color: #fecaca; }
    .tile-spinner {
      position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 0.35rem; z-index: 0; color: #64748b; font-size: 0.65rem;
    }
    .engines {
      position: fixed; top: 0; left: -1400px;
      width: 1280px; height: 720px;
      opacity: 0.01; pointer-events: none; z-index: 0;
      overflow: visible;
    }
    .engines iframe { width: 1280px; height: 720px; border: 0; display: block; }
    .wall-loading {
      position: fixed; inset: var(--toolbar-h) 0 0 0; z-index: 15; background: rgba(5, 8, 16, 0.92);
      display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1rem;
    }
    .wall-loading.hidden { display: none; }
    .wall-loading .step { color: #94a3b8; font-size: 0.85rem; min-height: 1.2em; }
    .wall-loading .step.active { color: #fbbf24; }
    .wall-loading .step.done { color: #4ade80; }
    .muted-label { color: #64748b; font-size: 0.75rem; }
    input[type=range] { width: 100px; }
  </style>
</head>
<body>
  <header class="toolbar">
    <a class="brand text-decoration-none text-light" href="/">Mira Cameras</a>
    <span class="stat-pill" id="totalStat">—</span>
    <span class="stat-pill live" id="liveStat">0 ao vivo</span>
    <span class="muted-label d-none d-md-inline" id="rotateStat">—</span>
    <a href="/" class="btn btn-outline-light btn-sm ms-2">Conta</a>
    <a href="https://github.com/mira-dev-tech/mira-cameras" class="btn btn-outline-secondary btn-sm btn-github" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
      <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      GitHub
    </a>
    <button type="button" class="btn btn-outline-danger btn-sm" id="logoutBtn">Sair</button>
    <div class="ms-auto d-flex align-items-center gap-2">
      <label class="muted-label mb-0" for="colsRange">Tamanho</label>
      <input type="range" id="colsRange" min="120" max="360" value="200">
      <button type="button" class="btn btn-outline-warning btn-sm" id="refreshBtn">Atualizar</button>
    </div>
  </header>

  <div id="wallLoading" class="wall-loading" aria-live="polite">
    <div class="spinner-border text-warning" role="status"></div>
    <div class="step active" id="loadStep1">Verificando sessão…</div>
    <div class="step" id="loadStep2">Listando câmeras online…</div>
    <div class="step" id="loadStep3">Conectando streams…</div>
    <div class="step" id="loadStep4">0 / 0 com imagem</div>
  </div>

  <div class="wall-wrap"><div class="wall-grid" id="wallGrid"></div></div>
  <div class="engines" id="engines" aria-hidden="true"></div>

  <footer class="site-footer">
    <span>Built by <a href="https://mira-dev.tech" target="_blank" rel="noopener noreferrer">Mirá Dev</a></span>
    <span aria-hidden="true">·</span>
    <a href="https://github.com/mira-dev-tech/mira-cameras" target="_blank" rel="noopener noreferrer">Source</a>
  </footer>

  <script src="/wall.js?v=6"></script>
</body>
</html>
