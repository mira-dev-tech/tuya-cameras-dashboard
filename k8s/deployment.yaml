apiVersion: apps/v1
kind: Deployment
metadata:
  name: mira-cameras
  namespace: mira-cameras
  labels:
    app: mira-cameras
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mira-cameras
  template:
    metadata:
      labels:
        app: mira-cameras
    spec:
      # Optional: pin to a single-node cluster (uncomment and set your node name)
      # nodeSelector:
      #   kubernetes.io/hostname: your-node-hostname
      containers:
        - name: mira-cameras
          image: mira-cameras:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LISTEN_ADDR
              value: ":8080"
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
